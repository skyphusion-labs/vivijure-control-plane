name: CI

# Typecheck + test on every push and PR. This workflow NEVER deploys; deploys live in
# deploy.yml and fire only on a v* tag.
#
# The job id below is `ci` ON PURPOSE: the org-level `aviation-grade-main` ruleset requires
# status check contexts named exactly `ci`, `coverage`, and `CodeQL`. Rename the job and every
# PR in this repo becomes permanently unmergeable (the required check never reports).
#
# vivijure-control-plane is PUBLIC and accepts outside PRs, so CI runs on GitHub-hosted
# ubuntu-latest (fork-safe sandbox), NOT the self-hosted fleet pool.
on:
  push:
    branches: [main]
    tags: ["v*"]
  # NO branches filter on pull_request, deliberately: with `branches: [main]` a STACKED PR
  # (base = another branch) matches nothing and runs ZERO checks, which GitHub reports as
  # "no checks reported" -- reads as fine, means unverified.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # tsc is NOT part of the vitest run, so type errors pass tests silently. This is the gate.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # The deploy config render is shell, so vitest never sees it. Its fail-closed guards are
      # what stand between a missing Actions secret and a deploy pointed at the wrong database,
      # so they are gated here, negative-tested, on every PR.
      - name: Config render guards
        run: bash tests/render-wrangler.test.sh

      # The front-door pages are classic scripts that tsc never sees and vitest never loads
      # (the suites test the pure helpers, not the DOM path). This catches a call to a function
      # nobody defines, which is a defect all three gates above pass silently. It is a heuristic
      # and says so; a clean run proves nobody deleted a function out from under its callers.
      - name: Resolve guard (front-door pages)
        run: npm run guard:resolve
