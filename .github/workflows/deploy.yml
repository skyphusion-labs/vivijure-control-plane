name: Deploy control plane

# THE control-plane release path. A v* tag HERE deploys the control plane; a v* tag in
# vivijure-cf deploys the Studio panel. The tag double-duty that used to exist (one repo, two
# products, shared tag semantics) is what the cf#85 extraction killed -- do not reintroduce it.
#
# NEVER on a bare push to main. An ordinary merge, even a docs-only one, must not redeploy the
# live plane. Releases are deliberate: bump package.json + src/version.ts, then cut a SemVer tag.
#   git tag -a v1.0.0 -m "..." && git push origin v1.0.0
#
# cf#80 CLOSES INTO THIS FILE. Read this before touching the migration step:
#   The live control-plane D1 was built by hand. 0001 was applied raw, 0002 was skipped, 0003 was
#   hand-applied after the fact, and there was NO d1_migrations ledger at all -- so nothing tracked
#   the gap. That produced TWO live provision failures in one e2e burn: an AUP accept 500 on a
#   missing aup_sha256 column, and a provision death at step r2_token on "no such column:
#   r2_token_id". The ledger was reconciled truthfully on 2026-07-17. From this repo forward there
#   is NO hand-applied schema, ever. Schema reaches the live database through this job or not at all.
#
# The repo schema-guard test cannot catch this class: it checks code against migrations, never
# against the DEPLOYED database. Only this workflow does.
#
# WHY TWO JOBS, and do not collapse them back into one:
#   The dry run used to be a step that ran `exit 0`. That ends the STEP, not the JOB -- so a
#   dry_run dispatch sailed straight on into migrate + deploy, doing the exact thing it was asked
#   not to do. The guard read as safe and was not.
#   Per-step `if:` conditions would fix today and rot tomorrow: the next person to add a step after
#   the guard has to remember to repeat the condition, and forgetting is silent and destructive.
#   A separate job carries the condition ONCE, at the job, so every step inside it inherits the
#   guard by construction and a newly-added step cannot escape it.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render config + report pending migrations, then STOP (no migrate, no deploy)"
        type: boolean
        default: true

permissions:
  contents: read

# Never two deploys against one live plane at once. NOT cancel-in-progress: cancelling a run
# midway through d1 migrations apply is how you get a half-migrated database with a ledger that
# disagrees with the schema, which is precisely the state cf#80 exists to end.
concurrency:
  group: deploy-control-plane
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------------------------------
  # PREFLIGHT -- always runs, never writes anything. Gates, renders config, and REPORTS what a
  # deploy would do. This is the entirety of a dry run.
  # ------------------------------------------------------------------------------------------
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # The gate runs again on the tag. CI already ran it on the PR, but a tag can point at ANY
      # commit, including one that never saw a PR. Deploying an unverified tree to the live plane
      # because "CI passed on main" is an assumption, not a check.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # The version guard, restated against the TAG. tests/version.test.ts proves package.json and
      # src/version.ts agree with each other; this proves they agree with the thing being shipped.
      # Without it, tagging v1.1.0 on a tree that still says 1.0.0 deploys a build reporting a
      # version it is not, and every later "which version is live" answer becomes a lie.
      - name: Tag matches the declared version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require(\"./package.json\").version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match package.json version ${pkg} -- refusing to deploy a mislabelled build"
            exit 1
          fi
          echo "tag ${GITHUB_REF_NAME} matches declared version ${pkg}."

      # Render here too, even though the release job renders again: a dry run must prove the
      # Actions secrets and variables are correctly populated, and the render guards are where
      # that gets proven. See scripts/render-wrangler.sh.
      - name: Render wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTROL_PLANE_D1_ID: ${{ secrets.CONTROL_PLANE_D1_ID }}
          TENANT_DISPATCH_NAMESPACE: ${{ vars.TENANT_DISPATCH_NAMESPACE }}
          TENANT_MODULE_NAMESPACE: ${{ vars.TENANT_MODULE_NAMESPACE }}
          STUDIO_RELEASES_BUCKET: ${{ vars.STUDIO_RELEASES_BUCKET }}
          STUDIO_RELEASE: ${{ vars.STUDIO_RELEASE }}
          CONTROL_PLANE_HOST: ${{ vars.CONTROL_PLANE_HOST }}
          CONTROL_PLANE_ZONE_NAME: ${{ vars.CONTROL_PLANE_ZONE_NAME }}
          AUP_VERSION: ${{ vars.AUP_VERSION }}
          AUP_URL: ${{ vars.AUP_URL }}
          POSTERN_SEND_URL: ${{ vars.POSTERN_SEND_URL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_ID: ${{ vars.GITHUB_OAUTH_CLIENT_ID }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_SERVICES_ID: ${{ vars.APPLE_SERVICES_ID }}
        run: scripts/render-wrangler.sh wrangler.toml

      # Show what a deploy WOULD do. On a clean release this prints the no-op line; anything else
      # is the cue that this tag carries schema change. Read-only: list, never apply.
      - name: Report pending migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations list CP_DB --remote

      - name: Dry run stops here
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          {
            echo "### Dry run -- nothing was migrated or deployed"
            echo ""
            echo "Config rendered and validated, pending migrations reported above."
            echo "The \`release\` job is SKIPPED by design; confirm that in the run view."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::dry run complete -- the release job is skipped, nothing was migrated or deployed."

  # ------------------------------------------------------------------------------------------
  # RELEASE -- everything that WRITES. Guarded ONCE, at the job. A dry_run dispatch skips this
  # entire job, which is visible as SKIPPED in the run view rather than inferred from a log line.
  # ------------------------------------------------------------------------------------------
  release:
    needs: preflight
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Rendered again rather than carried from preflight as an artifact. The rendered file holds
      # the account id and D1 id, and an artifact is downloadable from the run page by anyone who
      # can see the repo -- which is everyone, this repo is public. Re-rendering costs seconds.
      - name: Render wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTROL_PLANE_D1_ID: ${{ secrets.CONTROL_PLANE_D1_ID }}
          TENANT_DISPATCH_NAMESPACE: ${{ vars.TENANT_DISPATCH_NAMESPACE }}
          TENANT_MODULE_NAMESPACE: ${{ vars.TENANT_MODULE_NAMESPACE }}
          STUDIO_RELEASES_BUCKET: ${{ vars.STUDIO_RELEASES_BUCKET }}
          STUDIO_RELEASE: ${{ vars.STUDIO_RELEASE }}
          CONTROL_PLANE_HOST: ${{ vars.CONTROL_PLANE_HOST }}
          CONTROL_PLANE_ZONE_NAME: ${{ vars.CONTROL_PLANE_ZONE_NAME }}
          AUP_VERSION: ${{ vars.AUP_VERSION }}
          AUP_URL: ${{ vars.AUP_URL }}
          POSTERN_SEND_URL: ${{ vars.POSTERN_SEND_URL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_ID: ${{ vars.GITHUB_OAUTH_CLIENT_ID }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_SERVICES_ID: ${{ vars.APPLE_SERVICES_ID }}
        run: scripts/render-wrangler.sh wrangler.toml

      # MIGRATE BEFORE DEPLOY, deliberately. This ordering is load-bearing.
      #
      # Deploy-then-migrate leaves a window where NEW worker code is live against the OLD schema.
      # That window is not theoretical: it is exactly the cf#80 failure, where code referencing
      # aup_sha256 met a table without that column and threw a 500 on a real AUP accept.
      # Migrate-first is safe because control-plane migrations are ADDITIVE: old code tolerates a
      # column it does not know about, whereas new code cannot tolerate a missing one.
      #
      # If a migration is ever NOT additive (a drop, a rename, a narrowing), this ordering is WRONG
      # and the change needs a two-tag expand/contract instead. Do not silently reorder this step;
      # change the migration. See CONTRIBUTING.md.
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Tee, do not swallow: this output is the evidence the run happened, and on the expected
          # no-op path it is the literal "No migrations to apply" the cf#85 DoD asks us to verify.
          npx wrangler d1 migrations apply CP_DB --remote 2>&1 | tee /tmp/d1-migrate.log
          if grep -q "No migrations to apply" /tmp/d1-migrate.log; then
            echo "::notice::D1 no-op path confirmed -- ledger already matches migrations/, nothing applied."
          else
            echo "::notice::D1 migrations were applied on this tag. Ledger updated; see the log above."
          fi

      # Post-migration proof. migrations apply exiting 0 means it did not error; it does NOT by
      # itself prove the ledger now agrees with the directory. This asks the database again and
      # fails the deploy if anything is still pending, so a partial apply cannot slip through as a
      # green run and reach the deploy step below.
      - name: Verify no migrations remain pending
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler d1 migrations list CP_DB --remote 2>&1 | tee /tmp/d1-verify.log
          if grep -q "No migrations to apply" /tmp/d1-verify.log; then
            echo "::notice::verified -- live control-plane D1 ledger matches migrations/."
          else
            echo "::error::migrations still pending AFTER apply -- refusing to deploy the worker onto a schema that does not match this tag"
            exit 1
          fi

      # PREREQS only a real deploy can catch (typecheck never will):
      #   - the tenant dispatch namespace must EXIST, or the [[dispatch_namespaces]] binding is
      #     dangling and wrangler deploy fails outright
      #   - the studio-releases R2 bucket must exist AND hold the artifact for the pinned
      #     STUDIO_RELEASE tag, or provisioning fails honestly at wfp_upload later
      - name: Deploy control-plane worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      # THE missing signal. Every other deploy check hits a JSON route; the v1.3.1
      # outage served 500 on `/` and every HTML path for three days while those JSON
      # routes stayed green. This asserts on the RENDERED front-door result (200 AND
      # text/html AND a non-trivial front-door body) so that class of regression turns
      # this release run RED instead of sitting silent. DETECTION, not prevention:
      # Workers deploys are atomic with no pre-switch slot, so a bad build is briefly
      # live; the point is the run goes red and pings us within seconds, not days.
      - name: Verify human-visited surface renders
        env:
          CONTROL_PLANE_HOST: ${{ vars.CONTROL_PLANE_HOST }}
        run: scripts/smoke-human-surface.sh "https://${CONTROL_PLANE_HOST}"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Control-plane deploy: ${GITHUB_REF_NAME}"
            echo ""
            echo "- migrations: see the apply + verify steps above"
            echo "- worker: vivijure-control-plane"
          } >> "$GITHUB_STEP_SUMMARY"
