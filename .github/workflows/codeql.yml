name: CodeQL

# Supplies the `CodeQL` status check context required by the org `aviation-grade-main` ruleset,
# and the code-scanning alerts that ruleset gates on (high_or_higher / errors).
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-vivijure-control-plane-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # The three languages auto-detection actually finds in this repo. Declared rather than
        # left implicit so that what gets scanned is a decision on the page, not a side effect:
        #   javascript-typescript -- src/, tests/, AND public/ (the front-door pages)
        #   actions               -- the workflows themselves, which carry deploy credentials
        #   python                -- tests/workflow-guards.test.py
        language: ["javascript-typescript", "actions", "python"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `languages`, PLURAL. The input is `languages`; `language` is silently IGNORED -- the
      # action logs "Unexpected input(s) language" as a WARNING and carries on with
      # auto-detection, so the workflow stays green while the pin it appears to declare does
      # nothing. That was the state here until 2026-07-18: three languages were being scanned by
      # accident rather than the one this file claimed to select. It happened to be MORE coverage,
      # not less, which is exactly why nobody noticed.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
